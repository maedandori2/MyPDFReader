plugins {
    id 'com.android.application'
    id 'kotlin-android'
}

android {
    compileSdk 34
    namespace 'com.mypdf.reader'

    defaultConfig {
        applicationId "com.mypdf.reader"
        minSdk 22
        targetSdk 34
        versionCode 2
        versionName "1.1"
    }

    // -------------------------------------------------------------------------
    // Khối cấu hình ký ứng dụng (Signing Configurations) cho GitHub Actions
    // -------------------------------------------------------------------------
    signingConfigs {
        appSigning {
            // Kiểm tra nếu biến môi trường từ GitHub Secrets tồn tại (Môi trường CI)
            if (System.getenv("KEYSTORE_PASSWORD") != null) {
                storeFile file("github_actions_keystore.jks")
                storePassword System.getenv("KEYSTORE_PASSWORD")
                keyAlias System.getenv("KEY_ALIAS")
                keyPassword System.getenv("KEY_PASSWORD")
            } else {
                // Cấu hình mặc định khi chạy cục bộ nếu chưa thiết lập Keystore hệ thống
                storeFile file(System.getProperty("user.home") + "/.android/debug.keystore")
                storePassword "android"
                keyAlias "androiddebugkey"
                keyPassword "android"
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.appSigning
        }
        debug {
            debuggable true
            signingConfig signingConfigs.appSigning
        }
    }

    buildFeatures {
        compose true
        viewBinding true
    }

    // NÂNG CẤP LÊN 1.5.1 ĐỂ TƯƠNG THÍCH HOÀN TOÀN VỚI KOTLIN 1.9.0
    composeOptions {
        kotlinCompilerExtensionVersion '1.5.1'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    // AndroidX & Giao diện cốt lõi
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.recyclerview:recyclerview:1.3.2'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    
    // Xử lý dữ liệu & Vòng đời cấu trúc ứng dụng
    implementation 'com.google.code.gson:gson:2.10.1'
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.7.0'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
    implementation 'androidx.work:work-runtime-ktx:2.9.0'
    
    // Thư viện Xác thực Google Drive SDK Native chính thức
    implementation 'com.google.android.gms:play-services-auth:21.2.0'
}
