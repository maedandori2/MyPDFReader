name: Build APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Download Gradle wrapper jar
        run: |
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            https://github.com/gradle/gradle/raw/v8.1.1/gradle/wrapper/gradle-wrapper.jar

      - name: Setup Android SDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Inject Service Account JSON
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p app/src/main/assets
          echo "$SERVICE_ACCOUNT_JSON" > app/src/main/assets/service_account.json

      - name: Decode and Restore Keystore File
        env:
          ENCODED_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$ENCODED_KEYSTORE" | base64 --decode > app/github_actions_keystore.jks

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace
      
      - name: Update version.json
        run: |
          cat > version.json << EOF
          {
            "versionCode": ${{ github.run_number }},
            "versionName": "1.${{ github.run_number }}",
            "downloadUrl": "https://github.com/maedandori2/MyPDFReader/releases/latest/download/app-release.apk",
            "releaseNote": "Build tự động #${{ github.run_number }}"
          }
          EOF
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add version.json
          git commit -m "Update version.json [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MyPDFReader-release
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30
